		<style>
		    /* ========== 레이아웃 시스템 ========== */
		    :root { --sidebar-width: 350px; }
		    #side-dashboard {
		        width: var(--sidebar-width);
		        transition: transform 0.3s ease, box-shadow 0.3s ease;
		    }
		    #side-dashboard.collapsed { transform: translateX(calc(-1 * var(--sidebar-width))); box-shadow: none; }
		    #map, #kakao-map {
		        left: var(--sidebar-width) !important;
		        width: calc(100% - var(--sidebar-width)) !important;
		        transition: left 0.3s ease, width 0.3s ease;
		    }
		    body.sidebar-collapsed #map, body.sidebar-collapsed #kakao-map { left: 0 !important; width: 100% !important; }
		    #sidebar-toggle-btn {
		        position: fixed; top: 50%; left: var(--sidebar-width); transform: translateY(-50%);
		        z-index: 3001; width: 24px; height: 64px; background: #fff; border: 1px solid #d1d5db;
		        border-left: none; border-radius: 0 8px 8px 0; cursor: pointer; display: flex;
		        align-items: center; justify-content: center; box-shadow: 2px 0 8px rgba(0,0,0,0.1);
		        transition: left 0.3s ease; font-size: 14px; color: #64748b; padding: 0;
		    }
		    #sidebar-toggle-btn:hover { background: #f0f7ff; color: #0051af; }
		    body.sidebar-collapsed #sidebar-toggle-btn { left: 0; }

		    /* ========== 3블럭 Toolbar ========== */
		    #toolbar {
		        position: fixed; top: 12px; z-index: 2000; font-family: 'Segoe UI', sans-serif;

		        width: calc(100% - var(--sidebar-width) - 32px);
		        max-width: 1200px;
		        transition: left 0.3s ease, width 0.3s ease;
		        display: flex; flex-direction: column; gap: 0;
		        pointer-events: none;
		    }
		    body.sidebar-collapsed #toolbar { left: 16px; width: calc(100% - 32px); }
		    #toolbar > .tb-block { pointer-events: auto; }

		    .tb-block {
		        background: rgba(255,255,255,0.97); border-radius: 12px;
		        box-shadow: 0 2px 12px rgba(0,0,0,0.12); padding: 8px 14px;
		        margin-bottom: 6px; box-sizing: border-box;

		    .tb-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

		    /* 블럭1 - 주소/지적/감정평가 */
		    .tb-pill {
		        display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px;
		        border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer;
		        border: 1.5px solid #d1d5db; background: #fff; color: #475569;
		        transition: all 0.2s; user-select: none; white-space: nowrap;
		    }
		    .tb-pill:hover { border-color: #0051af; color: #0051af; }

		    .tb-sub { display: none; margin-top: 6px; padding-top: 6px; border-top: 1px solid #eee; }
		    .tb-sub.open { display: flex; }

		    /* 블럭2 - 우측 상단 데이터유형 패널 */
		    #block2 {
		        position: fixed; top: 12px; right: 12px; z-index: 2000;
		        background: rgba(255,255,255,0.97); border-radius: 12px;
		        box-shadow: 0 2px 12px rgba(0,0,0,0.12); padding: 8px 10px;
		        display: flex; flex-direction: column; gap: 4px;
		        font-family: 'Segoe UI', sans-serif;
		    }
		    .dt-chip {
		        display: flex; align-items: center; gap: 6px; padding: 6px 12px;
		        border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
		        border: 1.5px solid #e2e8f0; background: #fff; color: #64748b;

		        <input type="password" id="login-pw" placeholder="비밀번호 입력"
		            style="width:100%; padding:14px 16px; border:2px solid #e2e8f0; border-radius:12px; font-size:15px; box-sizing:border-box; outline:none; transition:border 0.2s;"
		            onfocus="this.style.borderColor='#0051af'" onblur="this.style.borderColor='#e2e8f0'"
		            onkeydown="if(event.key==='Enter') doLogin()">
		        <div id="login-error" style="color:#dc2626; font-size:12px; margin-top:8px; min-height:18px;"></div>
		        <button onclick="doLogin()"
		            style="width:100%; padding:14px; background:linear-gradient(135deg,#0051af,#0077ed); color:white; border:none; border-radius:12px; font-size:16px; font-weight:bold; cursor:pointer; margin-top:8px; transition:opacity 0.2s;"
		            onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">

		        </button>
		    </div>

		<script>
		// ★ 비밀번호 설정
		var SITE_PASSWORD = 'q9500!';
		var BUILDING_API = 'https://appraisalchoi.pythonanywhere.com';
		function doLogin() {
		    var pw = document.getElementById('login-pw').value;
		    if (pw === SITE_PASSWORD) {
		        document.getElementById('login-screen').style.display = 'none';
		        sessionStorage.setItem('authenticated', 'yes');
		        // 접속 기록 전송
		        fetch(BUILDING_API + '/api/log-access', {
		            method: 'POST',
		            headers: {'Content-Type': 'application/json'},
		            body: JSON.stringify({action: '로그인 성공'})
		        }).catch(function(){});
		    } else {
		        fetch(BUILDING_API + '/api/log-access', {
		            method: 'POST',
		            headers: {'Content-Type': 'application/json'},
		            body: JSON.stringify({action: '로그인 실패'})
		        }).catch(function(){});
		        document.getElementById('login-error').textContent = '비밀번호가 올바르지 않습니다.';
		        document.getElementById('login-pw').style.borderColor = '#dc2626';
		        document.getElementById('login-pw').value = '';
		        document.getElementById('login-pw').focus();
		    }
		}
		if (sessionStorage.getItem('authenticated') === 'yes') {
		    document.getElementById('login-screen').style.display = 'none';
		}

		        if (e.key === 'PrintScreen' || e.keyCode === 44) { e.preventDefault(); return false; }
		        if (e.ctrlKey && e.shiftKey && (e.key === 'S' || e.key === 's')) { e.preventDefault(); return false; }
		        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) { e.preventDefault(); return false; }
		        if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
		        if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) { e.preventDefault(); return false; }
		    });
		    var devtoolsOpen = false;
		    setInterval(function() {
		        var w = window.outerWidth - window.innerWidth > 160;

		        if (w || h) { if (!devtoolsOpen) { devtoolsOpen = true; var o = document.getElementById('capture-block'); if (o) o.style.display = 'flex'; } }
		        else { if (devtoolsOpen) { devtoolsOpen = false; var o = document.getElementById('capture-block'); if (o) o.style.display = 'none'; } }
		    }, 1000);
		})();

		// ========== 클립보드 캡쳐 방지 + IP 경고 ==========
		var _userIP = '';
		fetch('https://appraisalchoi.pythonanywhere.com/api/my-ip')
		    .then(function(r) { return r.json(); })
		    .then(function(d) { _userIP = d.ip || ''; })
		    .catch(function(){});

		setInterval(function() {
		    if (document.hasFocus() && !document.querySelector('.building-modal-overlay.active')) {
		        var now = new Date();

        // ========== 마커-라벨 연결선 시스템 ==========
        var connectorLines = {};
        function updateConnectorLine(layer) {
            if (!layer.getTooltip || !layer.getTooltip() || !layer.getLatLng) return;
            var fid = getFeatureId(layer.feature);
            var tooltip = layer.getTooltip();
            var off = tooltip.options.offset || [0, 0];
            var dist = Math.sqrt(off[0]*off[0] + off[1]*off[1]);

            if (dist < 20) {
                if (connectorLines[fid]) {
                    map.removeLayer(connectorLines[fid]);
                    delete connectorLines[fid];
                }
                return;
            }

            // 라벨 클래스에 따라 색상 결정 (라벨 테두리색과 동일)
            var cls = tooltip.options.className || '';
            var lineColor = '#3388ff'; // 기본 (파란색)
            if (cls.indexOf('_A') !== -1) lineColor = '#85b66f';
            else if (cls.indexOf('_B') !== -1) lineColor = '#3388ff';
            else if (cls.indexOf('_C') !== -1) lineColor = '#ff6b35';
            else if (cls.indexOf('_D') !== -1) lineColor = '#9333ea';
            else if (cls.indexOf('_E') !== -1) lineColor = '#0891b2';
            else if (cls.indexOf('_F') !== -1) lineColor = '#db2777';
            else if (cls.indexOf('_G') !== -1) lineColor = '#d97706';
            else if (cls.indexOf('_H') !== -1) lineColor = '#059669';

            var markerLatLng = layer.getLatLng();
            var markerPt = map.latLngToContainerPoint(markerLatLng);
            var labelPt = L.point(markerPt.x + off[0], markerPt.y + off[1]);
            var labelLatLng = map.containerPointToLatLng(labelPt);

            if (connectorLines[fid]) {
                connectorLines[fid].setLatLngs([markerLatLng, labelLatLng]);
                connectorLines[fid].setStyle({ color: lineColor });
            } else {
                connectorLines[fid] = L.polyline([markerLatLng, labelLatLng], {
                    color: lineColor,
                    weight: 2,
                    dashArray: '6,4',
                    opacity: 0.7,
                    interactive: false
                }).addTo(map);
            }
        }

        function updateAllConnectors() {
            map.eachLayer(function(layer) {
                if (layer.feature && layer.getTooltip && layer.getTooltip()) {
                    updateConnectorLine(layer);
                }
            });
        }

        map.on('moveend zoomend resize', updateAllConnectors);
        map.on('overlayadd overlayremove', function() {
            // 레이어 변경 시 불필요한 연결선 정리
            var activeFids = {};
            map.eachLayer(function(layer) {
                if (layer.feature && layer.getTooltip && layer.getTooltip()) {
                    activeFids[getFeatureId(layer.feature)] = true;
                }
            });
            Object.keys(connectorLines).forEach(function(fid) {
                if (!activeFids[fid]) {
                    map.removeLayer(connectorLines[fid]);
                    delete connectorLines[fid];
                }
            });
            setTimeout(updateAllConnectors, 200);
        });

        // ========== 줌 레벨별 라벨 크기 조정 ==========
        var labelScaleConfig = [

            { maxZoom: 99, scale: 1.10, fontMain: '15px', fontPrice: '17px', padding: '12px 16px', minW: '110px', maxW: '300px' }
        ];

        function updateLabelScale() {
            var zoom = map.getZoom();
            var cfg = labelScaleConfig[labelScaleConfig.length - 1];
            for (var i = 0; i < labelScaleConfig.length; i++) {
                if (zoom <= labelScaleConfig[i].maxZoom) {
                    cfg = labelScaleConfig[i];
                    break;
                }
            }
            var root = document.documentElement;
            root.style.setProperty('--label-scale', cfg.scale);
            root.style.setProperty('--label-font-main', cfg.fontMain);
            root.style.setProperty('--label-font-price', cfg.fontPrice);
            root.style.setProperty('--label-padding', cfg.padding);
            root.style.setProperty('--label-min-width', cfg.minW);
            root.style.setProperty('--label-max-width', cfg.maxW);

        // ========== 드래그 가능 라벨 시스템 ==========
        var tooltipOffsets = {};

		function getFeatureId(feature) {
		    var p = feature.properties;
		    return p['감정서번호'] || p['파일명'] || p['빌딩명'] || p['호텔명'] || p['골프장명(인수 후 명칭)'] || 
		           p['물류센터명'] || p['명칭'] || p['소재지(통'] || 
		           (p['위도'] + '_' + p['경도']) || JSON.stringify(p).substring(0, 80);
		}

        function getStoredOffset(feature, defaultOffset) {
            var fid = getFeatureId(feature);
            if (tooltipOffsets[fid]) return [tooltipOffsets[fid].x, tooltipOffsets[fid].y];
            return defaultOffset;
        }

        function makeDraggableTooltip(layer) {
            if (!layer.getTooltip || !layer.getTooltip()) return;
            var tooltip = layer.getTooltip();
            var el = tooltip.getElement();
            if (!el || el._dragReady) return;
            el._dragReady = true;
            el.classList.add('draggable-tooltip');
            var fid = getFeatureId(layer.feature);

            el.addEventListener('mousedown', function(e) {
                if (e.button !== 0) return;
                e.stopPropagation(); e.preventDefault();
                var startX = e.clientX, startY = e.clientY;
                var cur = tooltipOffsets[fid] || { x: tooltip.options.offset[0], y: tooltip.options.offset[1] };
                map.dragging.disable();
                el.style.cursor = 'grabbing';

                function onMove(ev) {
                    var nx = cur.x + (ev.clientX - startX);
                    var ny = cur.y + (ev.clientY - startY);
                    tooltip.options.offset = [nx, ny];
                    tooltipOffsets[fid] = { x: nx, y: ny };
                    if (layer.getLatLng) tooltip.setLatLng(layer.getLatLng());
                    updateConnectorLine(layer);
                }
                function onUp() {
                    map.dragging.enable();
                    el.style.cursor = 'grab';
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                }
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        }

        function bindDraggableTooltip(layer, content, className, defaultOffset) {
            var offset = getStoredOffset(layer.feature, defaultOffset);
            layer.bindTooltip(content, { permanent: true, direction: 'top', className: className, offset: offset, interactive: true });
            layer.on('tooltipopen', function() { setTimeout(function() { makeDraggableTooltip(layer); }, 50); });
        }

		function buildPopupContent_map_data(feature) {
		    function fmt(v) {
		        if (v === null || v === undefined) return '';
		        return autolinker.link(String(v).replace(/'/g, '\'').toLocaleString());
		    }
		    var props = feature.properties || {};
		    var rows = '';

		    var markerId = props['감정서번호'] || props['빌딩명'] || props['호텔명'] ||
		        props['골프장명(인수 후 명칭)'] || props['물류센터명'] || props['명칭'] ||
		        props['소재지(통'] || (props['위도'] + '_' + props['경도']) || '';
		    markerId = String(markerId).trim().replace(/[^a-zA-Z0-9가-힣_\-]/g, '_');

		    if (props['감정서번호']) {
		        var id = String(props['감정서번호']).trim();
		        var imgPath = "images/" + id + ".jpg";
		        rows += '<tr><td colspan="2" class="popup-image-container" style="text-align:center;">' +
		            '<img src="' + imgPath + '" ' +
		            'style="width:100%; max-height:250px; object-fit:contain; border-radius:8px; margin-bottom:10px;" ' +
		            'onerror="this.src=\'images/' + id + '.png\'; this.onerror=function(){this.style.display=\'none\'};">' +
		            '</td></tr>';
		    }

		    var cfg = popupFieldConfig_map_data;
		    for (var i = 0; i < cfg.fields.length; i++) {
		        var key = cfg.fields[i];
		        if (!cfg.visible[key]) continue;
		        var val = props[key];
		        if (val === null || val === undefined || val === '') continue;
		        rows += '<tr><th style="min-width:80px; text-align:left;">' + key + '</th><td>' + fmt(val) + '</td></tr>';
		    }

		    var attachHtml =
		        '<tr><td colspan="2" style="padding-top:10px; border-top:2px solid #e2e8f0;">' +
		        '<div id="attach-area-' + markerId + '" style="margin-top:4px;">' +
		        '  <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">' +
		        '    <span style="font-weight:bold; font-size:13px;">📎 첨부파일</span>' +
		        '    <label style="padding:4px 10px; background:#0051af; color:white; border-radius:5px; font-size:11px; cursor:pointer;">' +
		        '      업로드' +
		        '      <input type="file" multiple style="display:none;" onchange="uploadAttachFiles(this,\'' + markerId + '\')">' +
		        '    </label>' +
		        '  </div>' +
		        '  <div id="attach-list-' + markerId + '" style="font-size:12px; color:#555;">로딩 중...</div>' +
		        '</div>' +
		        '</td></tr>';

		    var tableContent = rows
		    tableContent += attachHtml;

		    setTimeout(function() { loadAttachList(markerId); }, 100);

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() { popup.update(); }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true; audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() { popup.setContent(tempDiv.innerHTML); popup.update(); }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true; video.src = src;
                    video.style.width = "400px"; video.style.height = "300px";
                    video.style.maxHeight = "60vh"; video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() { popup.update(); });
                    setTimeout(function() { popup.setContent(tempDiv.innerHTML); popup.update(); }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

		function parseFilterNumber(str) {
		    if (!str || str === '-') return null;
		    var cleaned = String(str).replace(/[,\s원평억Py㎡]/g, '');
		    var num = parseFloat(cleaned);
		    return isNaN(num) ? null : num;
		}
		
		function applyMultiFilter() {
		    var textInputs = document.querySelectorAll('.multi-filter-input');
		    var rangeMinInputs = document.querySelectorAll('.range-filter-min');
		    var rangeMaxInputs = document.querySelectorAll('.range-filter-max');
		    
		    var textFilters = [];
		    textInputs.forEach(function(input) {
		        if (input.value.trim() !== '') {
		            textFilters.push({ 
		                field: input.getAttribute('data-field'), 
		                altField: input.getAttribute('data-alt-field') || null,
		                value: input.value.toLowerCase().trim() 
		            });
		        }
		    });
		    
		    var rangeFilters = {};
		    rangeMinInputs.forEach(function(input) {
		        var field = input.getAttribute('data-field');
		        var altField = input.getAttribute('data-alt-field') || null;
		        if (!rangeFilters[field]) rangeFilters[field] = { altField: altField };
		        if (input.value.trim() !== '') rangeFilters[field].min = parseFloat(input.value.replace(/[,\s]/g, ''));
		    });
		    rangeMaxInputs.forEach(function(input) {
		        var field = input.getAttribute('data-field');
		        var altField = input.getAttribute('data-alt-field') || null;
		        if (!rangeFilters[field]) rangeFilters[field] = { altField: altField };
		        if (input.value.trim() !== '') rangeFilters[field].max = parseFloat(input.value.replace(/[,\s]/g, ''));
		    });
		    Object.keys(rangeFilters).forEach(function(k) {
		        if (rangeFilters[k].min === undefined && rangeFilters[k].max === undefined) delete rangeFilters[k];
		    });

		    var layerMap = { H: layer_H_data_0, G: layer_G_data_0, F: layer_F_data_0, E: layer_E_data_0, D: layer_D_data_0, C: layer_C_data_0, B: layer_B_data_0, A: layer_map_data };
		    var targetLayer = layerMap[activeFilterType] || layer_map_data;
		    var visibleCount = 0;

		    targetLayer.eachLayer(function(layer) {
		        var props = layer.feature.properties;
		        
		        var textMatch = textFilters.every(function(filter) {
		            var dataValue = String(props[filter.field] || '').toLowerCase();
		            if (filter.altField) {
		                var altValue = String(props[filter.altField] || '').toLowerCase();
		                return dataValue.includes(filter.value) || altValue.includes(filter.value);
		            }
		            return dataValue.includes(filter.value);
		        });
		        
		        var rangeMatch = Object.keys(rangeFilters).every(function(field) {
		            var rf = rangeFilters[field];
		            var numVal = parseFilterNumber(props[field]);
		            if (numVal === null && rf.altField) numVal = parseFilterNumber(props[rf.altField]);
		            if (numVal === null) return false;
		            if (rf.min !== undefined && !isNaN(rf.min) && numVal < rf.min) return false;
		            if (rf.max !== undefined && !isNaN(rf.max) && numVal > rf.max) return false;
		            return true;
		        });
		        
		        if (textMatch && rangeMatch) {
		            if (!map.hasLayer(layer)) map.addLayer(layer);
		            visibleCount++;
		        } else {
		            if (map.hasLayer(layer)) map.removeLayer(layer);
		        }
		    });
		    document.getElementById('filter-result-count').innerText = '검색 결과: ' + visibleCount + '건';
		    updateDashboard();
		}

		        A: { layer: layer_map_data, fileName: '공통접수건_검색결과' }
		    };
		    var c = layerMap[activeFilterType] || layerMap.A;

		    var visibleFeatures = [];
		    c.layer.eachLayer(function(layer) {
		        if (map.hasLayer(layer)) {
		            visibleFeatures.push(layer.feature.properties);
		        }
		    });
		    if (visibleFeatures.length === 0) { alert("내보낼 데이터가 없습니다."); return; }

		    var allKeys = [];
		    var keySet = {};
		    visibleFeatures.forEach(function(props) {
		        Object.keys(props).forEach(function(k) {
		            if (!keySet[k]) { keySet[k] = true; allKeys.push(k); }
		        });
		    });

		    var csvRows = [allKeys.map(function(k) { return '"' + k.replace(/"/g, '""') + '"'; }).join(',')];
		    visibleFeatures.forEach(function(props) {
		        var row = allKeys.map(function(k) {
		            var val = props[k];
		            if (val === null || val === undefined) val = '';
		            return '"' + String(val).replace(/"/g, '""') + '"';
		        });
		        csvRows.push(row.join(','));
		    });

		    var blob = new Blob(["\uFEFF" + csvRows.join("\n")], { type: 'text/csv;charset=utf-8;' });
		    var link = document.createElement("a");
		    link.setAttribute("href", URL.createObjectURL(blob));
		    link.setAttribute("download", c.fileName + "_" + new Date().toLocaleDateString() + ".csv");
		    document.body.appendChild(link); link.click(); document.body.removeChild(link);
		}

		// 유형 순서 (우선순위 높은 순)
		var cardTypeOrder = ['H', 'G', 'F', 'E', 'D', 'C', 'B', 'A'];

		function detectCardType(p) {
		    for (var i = 0; i < cardTypeOrder.length; i++) {
		        var type = cardTypeOrder[i];
		        if (cardConfig[type].detect(p)) return type;
		    }
		    return 'A';
		}

		function buildCardTag(tagCfg, p) {
		    var val;
		    if (tagCfg.format) {
		        val = tagCfg.format(p);
		    } else {
		        val = p[tagCfg.field];
		    }
		    if (!val || val === '-') return '';

		    var text = (tagCfg.prefix || '') + val + (tagCfg.suffix || '');
		    var style = tagCfg.style || 'default';

		    if (style === 'highlight') {
		        return '<span style="background:' + (tagCfg.highlightBg || '#fef3c7') + '; color:' + (tagCfg.highlightColor || '#92400e') +
		            '; padding:2px 6px; border-radius:4px; font-size:11px; border:1px dashed ' + (tagCfg.highlightBorder || '#fbbf24') + ';">' + text + '</span>';
		    } else if (style === 'accent') {
		        return '<span style="background:' + (tagCfg.accentBg || '#f1f5f9') + '; color:' + (tagCfg.accentColor || '#475569') +
		            '; padding:2px 6px; border-radius:4px; font-size:11px; border:1px solid ' + (tagCfg.accentBorder || '#e2e8f0') + ';">' + text + '</span>';
		    } else if (style === 'muted') {
		        return '<span style="background:#f8fafc; color:#64748b; padding:2px 6px; border-radius:4px; font-size:11px; border:1px dashed #cbd5e1;">' + text + '</span>';
		    } else {
		        return '<span style="background:#f1f5f9; color:#475569; padding:2px 6px; border-radius:4px; font-size:11px; border:1px solid #e2e8f0;">' + text + '</span>';
		    }
		}

		function buildCard(type, p, leafletId) {
		    var c = cardConfig[type];
		    var titleVal = p[c.title] || (c.titleAlt ? p[c.titleAlt] : '') || '정보 없음';

		    // 가격
		    var priceHtml = '';
		    if (c.price) {
		        var priceVal = p[c.price] || (c.priceAlt ? p[c.priceAlt] : '') || '금액 미정';
		        if (priceVal === '-') priceVal = '금액 미정';
		        if (c.priceFormat && priceVal !== '금액 미정') priceVal = c.priceFormat(priceVal);
		        priceHtml = '<div style="color:' + c.priceColor + '; font-weight:800; font-size:' + c.priceSize + '; margin-top:6px;">' +
		            (c.pricePrefix || '') + priceVal + (c.priceSuffix || '') + '</div>';
		    } else if (c.infoFormat) {
		        priceHtml = '<div style="font-size:' + c.priceSize + '; color:' + c.priceColor + '; margin-top:6px;">' +
		            c.infoFormat(p) + '</div>';
		    }

		    // 태그
		    var tagsHtml = '';
		    if (c.tags && c.tags.length > 0) {
		        var tagParts = [];
		        c.tags.forEach(function(tagCfg) {
		            var t = buildCardTag(tagCfg, p);
		            if (t) tagParts.push(t);
		        });
		        if (tagParts.length > 0) {
		            tagsHtml = '<div style="display:flex; flex-wrap:wrap; gap:4px; margin-top:8px;">' + tagParts.join('') + '</div>';
		        }
		    }

		    return '<div class="list-item type-' + type.toLowerCase() + '" onclick="focusAnyMarker(' + leafletId + ')" ' +
		        'style="padding:16px; border-bottom:1px solid #edf2f7; border-left:' + c.borderWidth + ' solid ' + c.color + '; background:' + c.bg + '; cursor:pointer; margin-bottom:4px;">' +
		        '<div style="font-size:11px; color:' + c.color + '; font-weight:bold; margin-bottom:4px;">' + c.icon + ' ' + c.label + '</div>' +
		        '<div style="font-weight:bold; font-size:' + c.titleSize + '; color:#2d3748;">' + titleVal + '</div>' +
		        priceHtml +
		        tagsHtml +
		        '</div>';
		}

		function updateDashboard() {
		    var listContainer = document.getElementById('list-container');
		    var countElement = document.getElementById('list-count');
		    if (!map) return;
		    var bounds = map.getBounds();
		    var listHtml = '';
		    var count = 0;

		    map.eachLayer(function(layer) {
		        if ((layer instanceof L.CircleMarker || layer instanceof L.Marker) && layer.feature && bounds.contains(layer.getLatLng())) {
		            var p = layer.feature.properties;
		            count++;
		            var type = detectCardType(p);
		            listHtml += buildCard(type, p, layer._leaflet_id);
		        }
		    });

		    listContainer.innerHTML = listHtml || '<div style="padding:40px; color:#a0aec0; text-align:center;">표시할 데이터가 없습니다.</div>';
		    countElement.innerText = count;
		}
		
		window.focusAnyMarker = function(leaflet_id) {
		    map.eachLayer(function(layer) {
		        if (layer._leaflet_id === leaflet_id) {
		            map.setView(layer.getLatLng(), 18);
		            layer.openPopup();
		        }
		    });
		};
		
		map.on('moveend zoomend', updateDashboard);

		function runBuildingSearch() {
		    var sido = document.getElementById('bm-sido').value.trim();
		    var sigungu = document.getElementById('bm-sigungu').value.trim();
		    var eupmyeondong = document.getElementById('bm-eupmyeondong').value.trim();
		    var ri = document.getElementById('bm-ri').value.trim();
		    var sel = document.getElementById('bm-uses-select');
		    var usesArr = [];
		    for (var i = 0; i < sel.options.length; i++) {
		        if (sel.options[i].selected) usesArr.push(sel.options[i].value);
		    }
		    var uses = usesArr.join(',');
		    if (!uses) { alert('검색할 용도를 선택하세요.'); return; }

		    if (!sido || !sigungu) { alert('시도와 시군구는 필수입니다.'); return; }

		    var btn = document.getElementById('bm-run-btn');
		    btn.disabled = true; btn.textContent = '⏳ 검색 중...';

		    var progressEl = document.getElementById('bm-progress');
		    var resultEl = document.getElementById('bm-result');
		    progressEl.style.display = 'block';
		    resultEl.style.display = 'none';

		    bmPollingTimer = setInterval(function() {
		        fetch(BUILDING_API + '/api/progress')
		            .then(function(r) { return r.json(); })
		            .then(function(p) {
		                document.getElementById('bm-progress-text').textContent = p.message || '';
		                document.getElementById('bm-progress-count').textContent = p.found + '건 발견';
		                var pct = p.total > 0 ? Math.round((p.current / p.total) * 100) : 0;
		                document.getElementById('bm-progress-fill').style.width = pct + '%';
		            }).catch(function(){});
		    }, 1000);

		    fetch(BUILDING_API + '/api/search', {
		        method: 'POST',
		        headers: { 'Content-Type': 'application/json' },
		        body: JSON.stringify({
		            sido: sido, sigungu: sigungu,
		            eupmyeondong: eupmyeondong, ri: ri,
		            target_uses: uses
		        })
		    })
		    .then(function(r) { return r.json(); })
			.then(function(data) {
	        	clearInterval(bmPollingTimer); bmPollingTimer = null;
		        btn.disabled = false; btn.textContent = '🔍 검색 시작 (건축물+소유권)';
		        document.getElementById('bm-progress-fill').style.width = '100%';

		        if (data.error) {
		            document.getElementById('bm-progress-text').textContent = '❌ ' + data.error;
		            return;
		        }

		        document.getElementById('bm-progress-text').textContent = '✅ ' + (data.message || '완료!');
		        resultEl.style.display = 'block';
		        document.getElementById('bm-result-count').textContent = (data.count || 0).toLocaleString();

		        var dlBtn = document.getElementById('bm-download-btn');
		        if (data.file) {
		            dlBtn.href = BUILDING_API + '/api/download/' + encodeURIComponent(data.file);
		            dlBtn.style.display = 'inline-block';
		            dlBtn.textContent = '📥 엑셀 다운로드 (건축물+소유권)';
		        }
		    })
		    .catch(function(err) {
		        clearInterval(bmPollingTimer); bmPollingTimer = null;
		        btn.disabled = false; btn.textContent = '🔍 검색 시작 (건축물+소유권)';
		        document.getElementById('bm-progress-text').textContent = '❌ 서버 연결 실패: ' + err.message;
		    });
		}

		// ========== 주소 검색 ==========
		var addrSearchMarker = null;

		function searchAddress() {
		    var query = document.getElementById('addr-search-input').value.trim();
		    if (!query) return;

		    var geocoder = new kakao.maps.services.Geocoder();
		    var places = new kakao.maps.services.Places();
		    var resultsDiv = document.getElementById('addr-search-results');
		    resultsDiv.innerHTML = '<div style="padding:12px; color:#888;">검색 중...</div>';
		    resultsDiv.style.display = 'block';

		    var allResults = [];

		    geocoder.addressSearch(query, function(result, status) {
		        if (status === kakao.maps.services.Status.OK) {
		            result.forEach(function(r) {
		               allResults.push({
		                    name: r.address_name,
		                    road: r.road_address ? r.road_address.address_name : '',
		                    jibun: r.address_name,
		                    lat: parseFloat(r.y),
		                    lng: parseFloat(r.x),
		                    type: '장소'
		                });
		            });
		        }

		        places.keywordSearch(query, function(result2, status2) {
		            if (status2 === kakao.maps.services.Status.OK) {
		                result2.forEach(function(r) {
		                    allResults.push({
		                        name: r.place_name,
		                        road: r.road_address_name || r.address_name,
		                        lat: parseFloat(r.y),
		                        lng: parseFloat(r.x),
		                        type: '장소'
		                    });
		                });
		            }

		            if (allResults.length === 0) {
		                resultsDiv.innerHTML = '<div style="padding:12px; color:#dc2626;">검색 결과가 없습니다.</div>';
		                return;
		            }

		            var html = '';
		            allResults.forEach(function(r, i) {
		                html += '<div onclick="goToAddress(' + r.lat + ',' + r.lng + ',\'' + r.name.replace(/'/g, '') + '\',\'' + (r.jibun || r.name).replace(/'/g, '') + '\')" ' +
		                    'style="padding:10px 14px; cursor:pointer; border-bottom:1px solid #f0f0f0; transition:background 0.15s;" ' +
		                    'onmouseover="this.style.background=\'#f0f7ff\'" onmouseout="this.style.background=\'white\'">' +
		                    '<div style="font-weight:bold; color:#1a202c;">' + r.name +
		                    '<span style="font-size:11px; color:#888; margin-left:6px; background:#f1f5f9; padding:1px 5px; border-radius:3px;">' + r.type + '</span></div>' +
		                    (r.road ? '<div style="font-size:11px; color:#888; margin-top:2px;">' + r.road + '</div>' : '') +
		                    '</div>';
		            });
		            resultsDiv.innerHTML = html;
		        });
		    });
		}

		function goToAddress(lat, lng, name, jibunAddr) {
		    map.setView([lat, lng], 17);
		    document.getElementById('addr-search-results').style.display = 'none';
		    if (addrSearchMarker) map.removeLayer(addrSearchMarker);

		    addrSearchMarker = L.marker([lat, lng]).addTo(map)
		        .bindPopup('<div style="text-align:center; padding:10px;"><b>' + name + '</b><br><span style="color:#888;">토지·건축물 정보 조회 중...</span></div>', {
		            maxHeight: 500, minWidth: 420, maxWidth: 460
		        })
		        .openPopup();

		    var searchAddr = jibunAddr || name;
		    var landData = null;
		    var bldData = null;
		    var pnuCode = null;
		    var done = 0;

		    function renderResult() {
		        done++;
		        if (done < 2) return;

		        var html = '<div style="font-size:12px;">';
		        html += '<div style="font-weight:bold; font-size:14px; margin-bottom:8px; padding-bottom:6px; border-bottom:2px solid #0051af;">' + name + '</div>';
		        if (pnuCode) html += '<div style="font-size:10px; color:#888; margin-bottom:8px;">PNU: ' + pnuCode + '</div>';

		        if (landData && !landData.error) {
		            html += '<div style="font-weight:bold; color:#0051af; margin-bottom:4px;">🏞️ 토지특성</div>';
		            html += '<table style="width:100%; border-collapse:collapse; margin-bottom:10px; font-size:11px;">';
		            var landFields = [
		                ['지목', landData['지목']], ['면적(㎡)', landData['토지면적']],
		                ['용도지역', landData['용도지역1']], ['용도지역2', landData['용도지역2']],
		                ['이용상황', landData['이용상황']], ['도로접면', landData['도로접면']],
		                ['지형높이', landData['지형높이']], ['지형형상', landData['지형형상']],
		                ['공시지가', landData['공시지가'] ? Number(landData['공시지가']).toLocaleString() + '원/㎡' : ''],
		                ['기준연도', landData['기준연도']]
		            ];
		            landFields.forEach(function(f) {
		                if (f[1]) {
		                    html += '<tr><th style="padding:3px 6px; background:#f0f7ff; white-space:nowrap; width:30%;">' + f[0] + '</th>';
		                    html += '<td style="padding:3px 6px;">' + f[1] + '</td></tr>';
		                }
		            });
		            html += '</table>';
		        } else {
		            html += '<div style="color:#888; margin-bottom:8px;">🏞️ 토지특성: ' + (landData ? landData.error : '조회 실패') + '</div>';
		        }

		        var blds = (bldData && bldData.buildings) ? bldData.buildings : [];
		        if (blds.length > 0) {
		            html += '<div style="font-weight:bold; color:#0051af; margin-bottom:4px;">🏢 건축물대장 (' + blds.length + '건)</div>';
		            blds.forEach(function(b, idx) {
		                if (idx > 0) html += '<div style="border-top:1px dashed #ddd; margin:6px 0;"></div>';
		                if (b['건물명']) html += '<div style="font-weight:bold; margin-bottom:3px;">' + b['건물명'] + '</div>';
		                html += '<table style="width:100%; border-collapse:collapse; font-size:11px;">';
		                var bldFields = [
		                    ['주용도', b['주용도']], ['구조', b['구조']],
		                    ['대지면적', b['대지면적'] ? Number(b['대지면적']).toLocaleString() + '㎡' : ''],
		                    ['건축면적', b['건축면적'] ? Number(b['건축면적']).toLocaleString() + '㎡' : ''],
		                    ['연면적', b['연면적'] ? Number(b['연면적']).toLocaleString() + '㎡' : ''],
		                    ['건폐율/용적률', (b['건폐율(%)'] || '-') + '% / ' + (b['용적률(%)'] || '-') + '%'],
		                    ['층수', (b['지상층수'] || '-') + '층 / 지하' + (b['지하층수'] || '-') + '층'],
		                    ['높이', b['높이(m)'] ? b['높이(m)'] + 'm' : ''],
		                    ['사용승인일', b['사용승인일']],
		                    ['도로명', b['도로명']]
		                ];
		                bldFields.forEach(function(f) {
		                    if (f[1] && f[1] !== '-% / -%') {
		                        html += '<tr><th style="padding:3px 6px; background:#f8f9fa; white-space:nowrap; width:30%;">' + f[0] + '</th>';
		                        html += '<td style="padding:3px 6px;">' + f[1] + '</td></tr>';
		                    }
		                });
		                html += '</table>';
		            });
		        } else if (bldData && bldData.error) {
		            html += '<div style="color:#dc2626;">🏢 건축물대장: ' + bldData.error + '</div>';
		        } else {
		            html += '<div style="color:#888;">🏢 건축물대장: 해당 필지에 건축물 없음</div>';
		        }

		        html += '</div>';
		        addrSearchMarker.setPopupContent(html);
		        addrSearchMarker.openPopup();
		    }

		    fetch(BUILDING_API + '/api/parcel-info', {
		        method: 'POST',
		        headers: { 'Content-Type': 'application/json' },
		        body: JSON.stringify({ address: searchAddr })
		    })
		    .then(function(r) { return r.json(); })
		    .then(function(data) {
		        bldData = data;
		        pnuCode = data.pnu || '';
		        if (pnuCode) {
		            queryLandDirect(pnuCode);
		        } else {
		            landData = { error: data.error || 'PNU 변환 실패' };
		            renderResult();
		        }
		        renderResult();
		    })
		    .catch(function(err) {
		        bldData = { error: '서버 연결 실패: ' + err.message };
		        landData = { error: '서버 연결 실패' };
		        done = 1;
		        renderResult();
		    });

			function queryLandDirect(pnu) {
			    fetch(BUILDING_API + '/api/land-info', {
			        method: 'POST',
			        headers: {'Content-Type': 'application/json'},
			        body: JSON.stringify({pnu: pnu})
			    })
			    .then(function(r) { return r.json(); })
			    .then(function(data) {
			        if (data.error) {
			            landData = {error: data.error};
			        } else {
			            landData = {
			                '지목': data['지목'] || '',
			                '토지면적': data['토지면적(㎡)'] || '',
			                '용도지역1': data['용도지역1'] || '',
			                '용도지역2': data['용도지역2'] || '',
			                '이용상황': data['토지이용상황'] || '',
			                '지형높이': data['지형높이'] || '',
			                '지형형상': data['지형형상'] || '',
			                '도로접면': data['도로접면'] || '',
			                '공시지가': data['공시지가(원/㎡)'] || '',
			                '기준연도': data['기준연도'] || ''
			            };
			        }
			        renderResult();
			    })
			    .catch(function(err) {
			        landData = {error: '서버 연결 실패: ' + err.message};
			        renderResult();
			    });
			}
		}

		// ========== 파일 첨부 시스템 ==========
		function loadAttachList(markerId) {
		    var listDiv = document.getElementById('attach-list-' + markerId);
		    if (!listDiv) return;
		    fetch(BUILDING_API + '/api/attach/list?marker_id=' + encodeURIComponent(markerId))
		        .then(function(r) { return r.json(); })
		        .then(function(files) {
		            if (files.length === 0) {
		                listDiv.innerHTML = '<span style="color:#aaa;">첨부된 파일이 없습니다.</span>';
		                return;
		            }
		            var html = '';
		            files.forEach(function(f) {
		                var dlUrl = BUILDING_API + '/api/attach/download/' + encodeURIComponent(markerId) + '/' + encodeURIComponent(f.filename);
		                html += '<div style="display:flex; align-items:center; gap:6px; padding:4px 0; border-bottom:1px solid #f0f0f0;">' +
		                    '<a href="' + dlUrl + '" target="_blank" style="flex:1; color:#0051af; text-decoration:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="' + f.filename + '">' +
		                    '📄 ' + f.filename + '</a>' +
		                    '<span style="color:#aaa; font-size:10px; white-space:nowrap;">' + f.size_kb + 'KB</span>' +
		                    '<button onclick="deleteAttachFile(\'' + markerId + '\',\'' + f.filename.replace(/'/g, "\\'") + '\')" ' +
		                    'style="background:none; border:none; color:#dc2626; cursor:pointer; font-size:14px; padding:0 4px;" title="삭제">✕</button>' +
		                    '</div>';
		            });
		            listDiv.innerHTML = html;
		        })
		        .catch(function() {
		            listDiv.innerHTML = '<span style="color:#dc2626;">파일 목록 로드 실패</span>';
		        });
		}
		// ========== 첨부파일 New 뱃지 ==========
		var attachBadgeCache = {};

		function checkAttachBadge(layer) {
		    if (!layer.feature) return;
		    var props = layer.feature.properties || {};
		    var markerId = props['감정서번호'] || props['빌딩명'] || props['호텔명'] ||
		        props['골프장명(인수 후 명칭)'] || props['물류센터명'] || props['명칭'] ||
		        props['소재지(통'] || (props['위도'] + '_' + props['경도']) || '';
		    markerId = String(markerId).trim().replace(/[^a-zA-Z0-9가-힣_\-]/g, '_');
		    if (!markerId) return;

		    fetch(BUILDING_API + '/api/attach/list?marker_id=' + encodeURIComponent(markerId))
		        .then(function(r) { return r.json(); })
		        .then(function(files) {
		            var fid = getFeatureId(layer.feature);
		            if (files.length > 0) {
		                attachBadgeCache[fid] = true;
		                addNewBadge(layer);
		            } else {
		                attachBadgeCache[fid] = false;
		                removeNewBadge(layer);
		            }
		        }).catch(function(){});
		}

		function addNewBadge(layer) {
		    if (!layer._icon && !layer._path) return;
		    var el = layer._icon || layer._path;
		    if (el.querySelector('.attach-new-badge')) return;
		    el.style.position = 'relative';
		    el.style.overflow = 'visible';
		    var badge = document.createElement('div');
		    badge.className = 'attach-new-badge';
		    badge.textContent = '📎 New!';
		    el.appendChild(badge);
		}

		function removeNewBadge(layer) {
		    var el = layer._icon || layer._path;
		    if (!el) return;
		    var badge = el.querySelector('.attach-new-badge');
		    if (badge) badge.remove();
		}

		function checkAllAttachBadges() {
		    var layers = [layer_map_data, layer_B_data_0, layer_C_data_0, layer_D_data_0, layer_E_data_0, layer_F_data_0, layer_G_data_0, layer_H_data_0];
		    layers.forEach(function(layerGroup) {
		        if (!map.hasLayer(layerGroup)) return;
		        layerGroup.eachLayer(function(layer) {
		            checkAttachBadge(layer);
		        });
		    });
		}

		var _origUpload = uploadAttachFiles;
		uploadAttachFiles = function(input, markerId) {
		    _origUpload(input, markerId);
		    setTimeout(checkAllAttachBadges, 2000);
		};
		var _origDelete = deleteAttachFile;
		deleteAttachFile = function(markerId, filename) {
		    _origDelete(markerId, filename);
		    setTimeout(checkAllAttachBadges, 1500);
		};

		setTimeout(checkAllAttachBadges, 2000);
		map.on('overlayadd', function() { setTimeout(checkAllAttachBadges, 500); });

		function uploadAttachFiles(input, markerId) {
		    var files = input.files;
		    if (!files || files.length === 0) return;
		    var listDiv = document.getElementById('attach-list-' + markerId);
		    if (listDiv) listDiv.innerHTML = '<span style="color:#888;">업로드 중...</span>';

		    var uploaded = 0;
		    var total = files.length;

		    for (var i = 0; i < files.length; i++) {
		        var formData = new FormData();
		        formData.append('marker_id', markerId);
		        formData.append('file', files[i]);

		        fetch(BUILDING_API + '/api/attach/upload', {
		            method: 'POST',
		            body: formData
		        })
		        .then(function(r) { return r.json(); })
		        .then(function() {
		            uploaded++;
		            if (uploaded >= total) loadAttachList(markerId);
		        })
		        .catch(function() {
		            uploaded++;
		            if (uploaded >= total) loadAttachList(markerId);
		        });
		    }
		    input.value = '';
		}

		function deleteAttachFile(markerId, filename) {
		    if (!confirm(filename + ' 파일을 삭제할까요?')) return;
		    fetch(BUILDING_API + '/api/attach/delete', {
		        method: 'POST',
		        headers: { 'Content-Type': 'application/json' },
		        body: JSON.stringify({ marker_id: markerId, filename: filename })
		    })
		    .then(function() { loadAttachList(markerId); })
		    .catch(function() { alert('삭제 실패'); });
		}
        </script>        
    </body>
